name: Auto Merge - Logs Only

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'logs/**'   # Hanya trigger jika ada perubahan di folder logs/

jobs:
  check-and-auto-merge:
    name: Check Files & Auto Merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            logs/**

      - name: Check if ALL changes are inside logs/ only
        id: check-scope
        run: |
          # Ambil semua file yang berubah di PR ini
          ALL_CHANGED=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path')

          echo "Files changed:"
          echo "$ALL_CHANGED"

          # Cek apakah ada file di luar folder logs/
          OUTSIDE_LOGS=$(echo "$ALL_CHANGED" | grep -v '^logs/' || true)

          if [ -n "$OUTSIDE_LOGS" ]; then
            echo "has_outside_changes=true" >> $GITHUB_OUTPUT
            echo "::warning::PR mengandung perubahan di luar folder logs/:"
            echo "$OUTSIDE_LOGS"
          else
            echo "has_outside_changes=false" >> $GITHUB_OUTPUT
            echo "Semua perubahan ada di dalam logs/"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check PR has no conflicts
        id: check-conflict
        if: steps.check-scope.outputs.has_outside_changes == 'false'
        run: |
          MERGEABLE=$(gh pr view ${{ github.event.pull_request.number }} \
            --json mergeable --jq '.mergeable')

          echo "Mergeable status: $MERGEABLE"
          echo "mergeable=$MERGEABLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto merge PR
        if: |
          steps.check-scope.outputs.has_outside_changes == 'false' &&
          steps.check-conflict.outputs.mergeable == 'MERGEABLE'
        run: |
          echo "PR memenuhi syarat: hanya mengubah logs/ dan tidak ada conflict"
          echo "Melakukan auto-merge..."

          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --subject "Auto-merge: ${{ github.event.pull_request.title }}" \
            --body "Auto-merged oleh GitHub Actions karena hanya mengubah folder logs/ dan tidak ada conflict."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip merge - perubahan di luar logs/
        if: steps.check-scope.outputs.has_outside_changes == 'true'
        run: |
          echo "Auto-merge dilewati: PR mengandung perubahan di luar folder logs/"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "**Auto-merge dilewati**

          PR ini mengandung perubahan di luar folder \`logs/\`, sehingga perlu review manual.

          Auto-merge hanya berlaku untuk PR yang **hanya** mengubah file di dalam \`logs/\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip merge - ada conflict
        if: |
          steps.check-scope.outputs.has_outside_changes == 'false' &&
          steps.check-conflict.outputs.mergeable != 'MERGEABLE'
        run: |
          echo "Auto-merge dilewati: PR memiliki conflict (status: ${{ steps.check-conflict.outputs.mergeable }})"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "**Auto-merge dilewati**

          PR ini memiliki **conflict** yang harus diselesaikan terlebih dahulu sebelum bisa di-merge.

          Silakan resolve conflict, lalu push ulang."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
